<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="Удобное расписание занятий Государственного Университета Управления (ГУУ) в формате Telegram Mini App." />
  <meta name="keywords" content="ГУУ, расписание, университет, студенты, занятия, расписание ГУУ" />

  <!-- Open Graph / Telegram -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Расписание ГУУ" />
  <meta property="og:description" content="Удобное расписание занятий ГУУ в твоем кармане." />
  <meta property="og:url" content="https://guu.ru" />
  <meta property="og:image" content="/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: {
              primary: '#007AFF', // iOS Blue
              secondary: '#5856D6', // iOS Indigo
              dark: '#1C1C1E', // iOS Dark Surface
              surface: '#F2F2F7', // iOS Light Surface
              card: '#FFFFFF',
            },
            guu: {
              blue: '#0055A4',
              orange: '#FF8200'
            }
          },
          borderRadius: {
            'ios': '1.25rem',
            'ios-lg': '1.5rem',
            'ios-xl': '2.25rem',
          }
        }
      }
    }
  </script>
  <style type="text/css">
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .dark .glass {
      background: rgba(28, 28, 30, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ios-shadow {
      shadow-color: rgba(0, 0, 0, 0.04);

      shadow-offset: {
        width: 0, height: 2
      }

      ;
      shadow-opacity: 1;
      shadow-radius: 8;
    }

    /* iOS-like transition */
    .page-transition-enter {
      opacity: 0;
      transform: scale(0.98) translateY(10px);
    }

    .page-transition-enter-active {
      opacity: 1;
      transform: scale(1) translateY(0);
      transition: opacity 300ms, transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
  <style>
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    body {
      background-color: #f8fafc;
      overscroll-behavior-y: none;
      font-family: 'Outfit', sans-serif;
      transition: background-color 0.3s ease;
    }

    .dark body {
      background-color: #0f172a;
      color: #f1f5f9;
    }

    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .dark .glass {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
