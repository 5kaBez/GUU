<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Bot - Панель администратора</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1>🤖 Schedule Bot</h1>
                <h2>Панель администратора</h2>
                <p style="color: var(--text-secondary); font-size: 14px; margin-top: 10px;">
                    Управление расписанием и администрирование
                </p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">🔐 Пароль администратора:</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Введите пароль" 
                        required
                        autofocus
                    >
                </div>
                <button type="submit" class="btn-primary">
                    Войти в панель управления
                </button>
            </form>
            
            <div id="loginError" class="error-message"></div>
            
            <p style="color: var(--text-secondary); font-size: 12px; margin-top: 20px; text-align: center;">
                ⚠️ Доступ ограничен. Только для администраторов.
            </p>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>
</html>
